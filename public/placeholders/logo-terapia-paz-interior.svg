<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-labelledby="title desc">
  <title id="title">Logo placeholder Terapia Paz Interior</title>
  <desc id="desc">Logo circular provisional con iniciales TP sobre una base teal suave.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#73c4ca" />
      <stop offset="100%" stop-color="#4c9fb0" />
    </linearGradient>
    <radialGradient id="glow" cx="32%" cy="28%" r="75%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.42" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
  </defs>
  <circle cx="160" cy="160" r="160" fill="url(#bg)" />
  <circle cx="160" cy="160" r="160" fill="url(#glow)" />
  <circle cx="160" cy="160" r="136" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="4" />
  <text
    x="160"
    y="178"
    text-anchor="middle"
    fill="#f8fdfe"
    font-family="Manrope, Arial, sans-serif"
    font-size="112"
    font-weight="800"
    letter-spacing="-6"
  >
    TP
  </text>
</svg>
